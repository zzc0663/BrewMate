name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: macos-14
    permissions:
      contents: write

    env:
      APP_NAME: BrewMate
      BUILD_NUMBER: ${{ github.run_number }}
      SIGN_AND_NOTARIZE: 1
      NOTARY_PROFILE: BrewMateNotary
      KEYCHAIN_PATH: ${{ runner.temp }}/build.keychain-db
      CERT_PATH: ${{ runner.temp }}/developer-id.p12
      API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APP_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store notarization credentials
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID"

      - name: Build, sign, notarize, and zip
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APP_IDENTITY }}
        run: bash scripts/release.sh

      - name: Render release notes
        run: bash scripts/render_release_notes.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrewMate-v${{ steps.version.outputs.value }}
          path: dist/BrewMate-v${{ steps.version.outputs.value }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BrewMate-v${{ steps.version.outputs.value }}.zip
          body_path: dist/release-notes.md
          generate_release_notes: true
